# Example: @pi-agent comment trigger with write access on a PR
name: Pi Agent
on:
  issue_comment:
    types: [created]

jobs:
  pi:
    # Write-back currently targets same-repository PR branches.
    if: github.event.issue.pull_request && contains(github.event.comment.body, '@pi-agent')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0
          persist-credentials: false
      - name: Run Pi
        uses: Mieluoxxx/pi-action@v1
        with:
          api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: '@pi-agent'
          write_mode: 'true'
          thinking: high
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
