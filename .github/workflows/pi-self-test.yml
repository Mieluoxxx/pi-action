name: PI Self-Test

# Dogfooding: pi-action reviews its own repo.
# Runs only here (Mieluoxxx/pi-action) and only on test/* branches
# to avoid spending API budget on every PR.
#
# Requires repo secrets:
#   PI_BASE_URL  — your Anthropic-messages-compatible endpoint
#   PI_API_KEY   — key for that endpoint
# And a repo variable:
#   PI_MODEL     — model id understood by your endpoint

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

jobs:
  pr-review:
    if: github.event_name == 'pull_request' && github.repository == 'Mieluoxxx/pi-action' && startsWith(github.head_ref, 'test/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Pi reviews the PR
        uses: ./
        with:
          base_url: ${{ secrets.PI_BASE_URL }}
          api: anthropic-messages
          model: ${{ vars.PI_MODEL }}
          api_key: ${{ secrets.PI_API_KEY }}
          direct_prompt: |
            这是 pi-action 仓库的自测 PR。请用中文,先给结论:
            1) 一句话总结这个 PR 改了什么。
            2) 重点检查 src/trigger.ts 里 parseTrigger(commentBody, phrase):
               当 phrase 是空字符串时,它的行为是什么?这是不是一个 bug?
               引用具体代码行说明。
            3) 列出你发现的任何其它问题;没有就写"无明显问题"。
          thinking: low
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pi-ask:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@pi') && github.repository == 'Mieluoxxx/pi-action'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Pi answers @pi
        uses: ./
        with:
          base_url: ${{ secrets.PI_BASE_URL }}
          api: anthropic-messages
          model: ${{ vars.PI_MODEL }}
          api_key: ${{ secrets.PI_API_KEY }}
          trigger_phrase: '@pi'
          thinking: low
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
